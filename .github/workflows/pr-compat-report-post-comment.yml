# Based on https://securitylab.github.com/research/github-actions-preventing-pwn-requests/

name: Post compat report as PR comment

on:
  workflow_run:
    workflows: ["Generate PR compat report"]
    types: [completed]

jobs:
  post-comment:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: .github/compat-report-too-large.md
        sparse-checkout-cone-mode: false

    - name: 'Download artifact'
      uses: actions/github-script@v9
      with:
        script: |
          var artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: ${{github.event.workflow_run.id }}
          })
          var matchArtifact = artifacts.data.artifacts.filter((artifact) => {
            return artifact.name === "compat-report"
          })[0];
          var download = await github.rest.actions.downloadArtifact({
            owner: context.repo.owner,
            repo: context.repo.repo,
            artifact_id: matchArtifact.id,
            archive_format: 'zip'
          });
          var fs = require('fs');
          fs.writeFileSync('${{github.workspace}}/compat-report.zip', Buffer.from(download.data));

    - run: unzip compat-report.zip

    - name: Replace report if too long for GitHub comment
      run: |
        if [ $(wc -c < ./compat-report.md) -gt 60000 ]; then
          cp .github/compat-report-too-large.md ./compat-report.md
        fi

    - name: Post as comment to PR
      run: |
        gh pr comment $(cat ./NR.txt) -F ./compat-report.md -R slick/slick
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
